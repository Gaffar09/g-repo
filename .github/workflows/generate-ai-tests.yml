name: Generate AI Test Cases

permissions:
  contents: write

on:
  push:
    paths:
      - "msdat_aiprompts/prompts/**"
      - "msdat_aiprompts/inputs/**"
      - "msdat_aiprompts/scripts/**"
      - "msdat_aiprompts/config/**"
  workflow_dispatch:

jobs:
  generate-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai

      - name: Generate test cases using AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python msdat_aiprompts/scripts/generate_tests.py

      - name: Show generated files
        run: |
          pwd
          find msdat_aiprompts/outputs -type f

      - name: Upload generated test cases
        uses: actions/upload-artifact@v4
        with:
          name: generated-ai-test-cases
          path: msdat_aiprompts/outputs/generated-tests/

      - name: Commit generated test cases
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add msdat_aiprompts/outputs/generated-tests/
          git commit -m "Add generated AI test cases" || echo "No changes to commit"
          git push
