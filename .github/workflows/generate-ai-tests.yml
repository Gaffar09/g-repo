name: Generate AI Test Cases

on:
  push:
    paths:
      - "prompts/**"
      - "inputs/**"
      - "scripts/**"
  workflow_dispatch:

jobs:
  generate-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Generate test cases using AI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_tests.py

      - name: Upload generated test cases
        uses: actions/upload-artifact@v4
        with:
          name: generated-ai-test-cases
          path: outputs/generated-tests/
